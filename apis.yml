aid: fundera
name: Fundera
description: >
  Fundera by NerdWallet is a small business financial guidance and lending
  marketplace platform that helps small business owners compare and access
  loan products, business credit cards, checking accounts, and financial
  health tools. Fundera connects borrowers with a vetted network of lenders
  offering SBA loans, term loans, lines of credit, equipment financing,
  invoice factoring, merchant cash advances, and commercial real estate loans.
  Acquired by NerdWallet in 2020, Fundera has secured over $5.4 billion in
  funds for more than 77,000 small businesses.
